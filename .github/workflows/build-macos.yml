name: Build macOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  detect-changes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.changes.outputs.desktop_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect desktop client changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha='${{ github.event.before }}'
          after_sha='${{ github.sha }}'

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            before_sha="$(git rev-parse HEAD^)"
          fi

          changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|package\.json$|package-lock\.json$|scripts/publish-build\.js$)'; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos-arm64:
    if: github.actor != 'github-actions[bot]' && needs.detect-changes.outputs.desktop_changed == 'true'
    needs: detect-changes
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sources
        run: npm run check

      - name: Build macOS arm64
        run: npm run build:mac

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp dist/Ura\ Helper-*-mac-arm64.dmg release-assets/Ura-Helper-macos-arm64.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets/Ura-Helper-macos-arm64.dmg
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/Ura-Helper-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-public-download:
    if: github.actor != 'github-actions[bot]' && needs.detect-changes.outputs.desktop_changed == 'true'
    needs:
      - detect-changes
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Git LFS
        shell: bash
        run: git lfs install

      - name: Download built DMG
        uses: actions/download-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets

      - name: Publish DMG into web downloads
        shell: bash
        run: |
          mkdir -p server/public/downloads
          cp release-assets/Ura-Helper-macos-arm64.dmg server/public/downloads/Ura-Helper-macos-arm64.dmg

      - name: Commit published DMG
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes server/public/downloads/Ura-Helper-macos-arm64.dmg
          if git diff --cached --quiet; then
            echo "No DMG changes to commit"
            exit 0
          fi
          git commit -m "chore: publish macOS DMG [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  deploy-o2switch:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && needs.detect-changes.result == 'success' && (needs.publish-public-download.result == 'success' || needs.publish-public-download.result == 'skipped')
    needs:
      - detect-changes
      - publish-public-download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        env:
          O2SWITCH_SSH_HOST: ${{ secrets.O2SWITCH_SSH_HOST }}
          O2SWITCH_SSH_PORT: ${{ secrets.O2SWITCH_SSH_PORT }}
          O2SWITCH_SSH_USER: ${{ secrets.O2SWITCH_SSH_USER }}
          O2SWITCH_SSH_PRIVATE_KEY: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}
          O2SWITCH_REPO_PATH: ${{ secrets.O2SWITCH_REPO_PATH }}
          O2SWITCH_PASSENGER_APP_PATH: ${{ secrets.O2SWITCH_PASSENGER_APP_PATH }}
        run: |
          for secret_name in O2SWITCH_SSH_HOST O2SWITCH_SSH_PORT O2SWITCH_SSH_USER O2SWITCH_SSH_PRIVATE_KEY O2SWITCH_REPO_PATH O2SWITCH_PASSENGER_APP_PATH; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub Actions secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Configure SSH key
        shell: bash
        env:
          O2SWITCH_SSH_HOST: ${{ secrets.O2SWITCH_SSH_HOST }}
          O2SWITCH_SSH_PORT: ${{ secrets.O2SWITCH_SSH_PORT }}
          O2SWITCH_SSH_PRIVATE_KEY: ${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}
          O2SWITCH_SSH_KNOWN_HOSTS: ${{ secrets.O2SWITCH_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          key_file=~/.ssh/id_ed25519
          key_material="$O2SWITCH_SSH_PRIVATE_KEY"

          if printf '%s' "$key_material" | grep -q 'BEGIN .*PRIVATE KEY'; then
            printf '%b' "$key_material" | tr -d '\r' > "$key_file"
          else
            printf '%s' "$key_material" | tr -d '\r' | base64 -d > "$key_file" || {
              echo '::error::O2SWITCH_SSH_PRIVATE_KEY must be either the full private key text or a base64-encoded private key.'
              exit 1
            }
          fi

          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null || {
            echo '::error::Invalid SSH private key. Store the full private key including BEGIN/END lines, or a base64-encoded private key.'
            exit 1
          }

          if [ -n "$O2SWITCH_SSH_KNOWN_HOSTS" ]; then
            printf '%b\n' "$O2SWITCH_SSH_KNOWN_HOSTS" | tr -d '\r' > ~/.ssh/known_hosts
          else
            ssh-keyscan_output="$(ssh-keyscan -T 30 -p "$O2SWITCH_SSH_PORT" -H "$O2SWITCH_SSH_HOST" 2>&1)"
            if [ -z "$ssh-keyscan_output" ]; then
              echo "::error::ssh-keyscan returned no host key for $O2SWITCH_SSH_HOST:$O2SWITCH_SSH_PORT. If this host is reachable from your machine but not from GitHub runners, add O2SWITCH_SSH_KNOWN_HOSTS as a GitHub secret to bypass ssh-keyscan."
              exit 1
            fi

            if ! printf '%s\n' "$ssh-keyscan_output" | tee -a ~/.ssh/known_hosts | grep -q '^|\|^[^#]'; then
              printf '%s\n' "$ssh-keyscan_output"
              echo "::error::Unable to record the SSH host key for $O2SWITCH_SSH_HOST:$O2SWITCH_SSH_PORT."
              exit 1
            fi
          fi

      - name: Deploy to o2switch
        shell: bash
        env:
          O2SWITCH_SSH_HOST: ${{ secrets.O2SWITCH_SSH_HOST }}
          O2SWITCH_SSH_PORT: ${{ secrets.O2SWITCH_SSH_PORT }}
          O2SWITCH_SSH_USER: ${{ secrets.O2SWITCH_SSH_USER }}
          O2SWITCH_REPO_PATH: ${{ secrets.O2SWITCH_REPO_PATH }}
          O2SWITCH_PASSENGER_APP_PATH: ${{ secrets.O2SWITCH_PASSENGER_APP_PATH }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -p "$O2SWITCH_SSH_PORT" "$O2SWITCH_SSH_USER@$O2SWITCH_SSH_HOST" \
            "bash -s -- '$O2SWITCH_REPO_PATH' '$O2SWITCH_PASSENGER_APP_PATH' '${{ github.ref_name }}'" < scripts/deploy-o2switch.sh