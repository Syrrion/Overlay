name: Build macOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  detect-changes:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      desktop_changed: ${{ steps.changes.outputs.desktop_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect desktop client changes
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before_sha='${{ github.event.before }}'
          after_sha='${{ github.sha }}'

          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            before_sha="$(git rev-parse HEAD^)"
          fi

          changed_files="$(git diff --name-only "$before_sha" "$after_sha")"
          printf '%s\n' "$changed_files"

          if printf '%s\n' "$changed_files" | grep -Eq '^(src/|package\.json$|package-lock\.json$|scripts/publish-build\.js$)'; then
            echo "desktop_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "desktop_changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos-arm64:
    if: github.actor != 'github-actions[bot]' && needs.detect-changes.outputs.desktop_changed == 'true'
    needs: detect-changes
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sources
        run: npm run check

      - name: Build macOS arm64
        run: npm run build:mac

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp dist/Ura\ Helper-*-mac-arm64.dmg release-assets/Ura-Helper-macos-arm64.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets/Ura-Helper-macos-arm64.dmg
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/Ura-Helper-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-public-download:
    if: github.actor != 'github-actions[bot]' && needs.detect-changes.outputs.desktop_changed == 'true'
    needs:
      - detect-changes
      - build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Git LFS
        shell: bash
        run: git lfs install

      - name: Download built DMG
        uses: actions/download-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets

      - name: Publish DMG into web downloads
        shell: bash
        run: |
          mkdir -p server/public/downloads
          cp release-assets/Ura-Helper-macos-arm64.dmg server/public/downloads/Ura-Helper-macos-arm64.dmg

      - name: Commit published DMG
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes server/public/downloads/Ura-Helper-macos-arm64.dmg
          if git diff --cached --quiet; then
            echo "No DMG changes to commit"
            exit 0
          fi
          git commit -m "chore: publish macOS DMG [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  deploy-o2switch:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]' && needs.detect-changes.result == 'success' && (needs.publish-public-download.result == 'success' || needs.publish-public-download.result == 'skipped')
    needs:
      - detect-changes
      - publish-public-download
    runs-on: ubuntu-latest

    steps:
      - name: Validate deployment secrets
        shell: bash
        env:
          O2SWITCH_DEPLOY_URL: ${{ secrets.O2SWITCH_DEPLOY_URL }}
          O2SWITCH_DEPLOY_TOKEN: ${{ secrets.O2SWITCH_DEPLOY_TOKEN }}
        run: |
          for secret_name in O2SWITCH_DEPLOY_URL O2SWITCH_DEPLOY_TOKEN; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing GitHub Actions secret: ${secret_name}"
              exit 1
            fi
          done

      - name: Trigger o2switch deploy webhook
        shell: bash
        env:
          O2SWITCH_DEPLOY_URL: ${{ secrets.O2SWITCH_DEPLOY_URL }}
          O2SWITCH_DEPLOY_TOKEN: ${{ secrets.O2SWITCH_DEPLOY_TOKEN }}
        run: |
          curl --fail-with-body --show-error --silent \
            --request POST \
            --header "Authorization: Bearer $O2SWITCH_DEPLOY_TOKEN" \
            --header "Content-Type: application/json" \
            --data '{"branch":"${{ github.ref_name }}"}' \
            "$O2SWITCH_DEPLOY_URL"