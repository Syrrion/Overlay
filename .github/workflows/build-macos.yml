name: Build macOS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build-macos-arm64:
    if: github.actor != 'github-actions[bot]'
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate sources
        run: npm run check

      - name: Build macOS arm64
        run: npm run build:mac

      - name: Prepare release asset
        shell: bash
        run: |
          mkdir -p release-assets
          cp dist/Ura\ Helper-*-mac-arm64.dmg release-assets/Ura-Helper-macos-arm64.dmg

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets/Ura-Helper-macos-arm64.dmg
          if-no-files-found: error

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/Ura-Helper-macos-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-public-download:
    if: github.actor != 'github-actions[bot]'
    needs: build-macos-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Git LFS
        shell: bash
        run: git lfs install

      - name: Download built DMG
        uses: actions/download-artifact@v4
        with:
          name: ura-helper-macos-arm64
          path: release-assets

      - name: Publish DMG into web downloads
        shell: bash
        run: |
          mkdir -p server/public/downloads
          cp release-assets/Ura-Helper-macos-arm64.dmg server/public/downloads/Ura-Helper-macos-arm64.dmg

      - name: Commit published DMG
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .gitattributes server/public/downloads/Ura-Helper-macos-arm64.dmg
          if git diff --cached --quiet; then
            echo "No DMG changes to commit"
            exit 0
          fi
          git commit -m "chore: publish macOS DMG [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}

  deploy-o2switch:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
    needs: publish-public-download
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.O2SWITCH_SSH_PRIVATE_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p '${{ secrets.O2SWITCH_SSH_PORT }}' -H '${{ secrets.O2SWITCH_SSH_HOST }}' >> ~/.ssh/known_hosts

      - name: Deploy to o2switch
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 -p '${{ secrets.O2SWITCH_SSH_PORT }}' '${{ secrets.O2SWITCH_SSH_USER }}@${{ secrets.O2SWITCH_SSH_HOST }}' \
            "bash -s -- '${{ secrets.O2SWITCH_REPO_PATH }}' '${{ secrets.O2SWITCH_PASSENGER_APP_PATH }}' '${{ github.ref_name }}'" < scripts/deploy-o2switch.sh