<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ura Helper Web</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
  </head>
  <body>
    <main class="viewer-shell">
      <header class="viewer-header">
        <div class="brand-mark">UH</div>
        <div class="hero-copy">
          <p class="eyebrow" id="mode-eyebrow">Viewer Web</p>
          <h1 style="display: flex; align-items: center; gap: 12px;">Ura Helper <span class="version-badge">v__VERSION__</span></h1>
            <p class="hero-text" id="mode-copy">Consulte la sequence en direct depuis une simple URL, sans installer le client lourd.</p>
            <div class="download-links">
              <a class="download-link" href="https://github.com/Syrrion/Overlay/releases/latest/download/Ura-Helper-v__VERSION__-windows-x64-portable.exe">
                <svg viewBox="0 0 88 88"><path d="M0 12.4l35.6-4.8v31.4H0V12.4zm35.6 30.2v31L0 68.8V42.6h35.6zm4.8-31L88 6v33.4H40.4V11.6zm0 35H88v33.2l-47.6-6.4V46.6z"/></svg>
                Télécharger pour Windows (.exe)
              </a>
              <a class="download-link" href="https://github.com/Syrrion/Overlay/releases/latest/download/Ura-Helper-v__VERSION__-macos-arm64.dmg">
                <svg viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
                Télécharger pour macOS (.dmg)
              </a>
            </div>
          </div>
      </header>

      <section class="viewer-panel" aria-labelledby="viewer-title">
        <div class="mode-switch" aria-label="Mode web">
          <button class="mode-button" id="viewer-mode" type="button">Viewer</button>
          <button class="mode-button" id="leader-mode" type="button">Leader</button>
        </div>

        <div class="status-row">
          <span class="status-pill is-pending" id="status-pill">Connexion</span>
          <p class="status-text" id="status-text">Connexion au relais...</p>
          <span class="meta-pill client-count" id="connected-count" title="Connectes" aria-label="0 connecte">0 connecte</span>
        </div>

        <h2 class="section-title" id="viewer-title">Sequence synchronisee</h2>
        <ol class="symbol-sequence" id="sequence" aria-label="Sequence de symboles"></ol>

        <div class="expiry-track is-hidden" id="expiry-track" aria-hidden="true">
          <span class="expiry-fill" id="expiry-fill"></span>
        </div>

        <div class="leader-controls is-hidden" id="leader-controls" aria-label="Commandes Leader">
          <div class="symbol-actions" id="symbol-actions"></div>
          <button class="clear-button" id="clear-sequence" type="button">Effacer</button>
        </div>
      </section>
    </main>
  </body>
</html>
